# Multiple jobs with mixed outcomes — tests job status icons and step display
name: Multi-Job Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deploy step'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ESLint
        run: echo "Linting..." && sleep 2
      - name: Prettier check
        run: echo "Checking formatting..."

  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        run: echo "Setting up Node.js..."
      - name: Run unit tests
        run: echo "Running 128 unit tests..." && sleep 5
      - name: Upload results
        run: echo "Done"

  test-e2e:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup browser
        run: echo "Installing Playwright..."
      - name: Run E2E tests
        run: echo "Running 24 E2E tests..." && sleep 10
      - name: Generate screenshots
        run: echo "Capturing screenshots..."

  deploy:
    runs-on: ubuntu-latest
    needs: [test-unit, test-e2e]
    if: ${{ github.event.inputs.skip_deploy != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploying..." && sleep 3
      - name: Smoke test
        run: echo "Smoke testing..." && sleep 2
      - name: Notify
        run: echo "Deployment complete!"
