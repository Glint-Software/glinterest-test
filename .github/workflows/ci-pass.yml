# CI that always passes — tests basic success display
name: CI (Pass)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: echo "Installing..."
      - name: Build
        run: echo "Building..."
      - name: Lint
        run: echo "Linting..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: echo "Running tests..." && sleep 5
      - name: Run integration tests
        run: echo "Integration tests..." && sleep 3
